name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync --locked
      # LLM-marked tests are excluded by pyproject addopts; CI has no API key.
      - run: uv run pytest -q

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2"
      - run: bun install --frozen-lockfile
      - run: bun test
      # tsc -b, not --noEmit: tsconfig.json is solution-style, and plain tsc
      # ignores project references and checks nothing at all.
      - run: bunx tsc -b
